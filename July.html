<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>您有一張專屬畢業祝賀卡</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fff0f3;
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        /* --- 2. 單一卡片容器 (修正後：毛玻璃質感) --- */
        /* 將圖片和下方文字、按鈕都包裹在同一個容器 */
        .card-container {
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); /* 增加陰影 */
            border-radius: 16px;
            overflow: hidden;
            
            /* 強制應用毛玻璃效果 */
            background-color: rgba(255, 255, 255, 0.85); /* 白色半透明 */
            backdrop-filter: blur(10px); /* 模糊濾鏡 (關鍵) */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5); /* 柔和邊框 */
            
            text-align: center;
            padding-bottom: 24px;
        }

        /* --- 3. 卡片圖片 (修正後) --- */
        .card-image {
            width: 100%;
            height: auto;
            display: block;
            /* 圖片本身不帶背景色，以免遮擋毛玻璃容器 */
            min-height: 200px;
        }

        /* --- 4. 按鈕樣式 (維持不變) --- */
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #FFD700; 
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #FFD700;
        }

        .download-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(30, 60, 114, 0.3);
        }

        /* --- 5. 文字樣式 (修正後) --- */
        .greeting-text {
            margin-top: 20px;
            font-size: 22px;
            color: #1e3c72;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .text {
            margin-top: 16px;
            font-size: 18px;
            color: #1e3c72;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="card.jpg" alt="畢業祝賀卡" class="card-image">
        
        <div class="greeting-text">🎓 畢業啦~ 🎓</div>
        <div class="text">祝布農族美女快樂</div>
        <div class="text">祝我上班也快樂謝謝</div>
        
        <a href="card.jpg" download="超狂畢業賀卡.jpg" class="download-btn">
            想存再存啦~
        </a>
    </div>

</body>
</html>
